<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliva - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/index.css"> 
    <link rel="stylesheet" href="./assets/css/admin.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">OLIVA ADMIN</a>
        <a href="index.html" class="continue-buying">Voltar para a Loja</a>
    </header>

    <main class="admin-container">
        <h1>Gerenciar Produtos</h1>

        <div id="admin-login-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;">
            <h2 style="color: #333; margin-bottom: 20px;">🔒 Painel Administrativo </h2>
            <input type="password" id="senha-admin-input" placeholder="Digite a senha..." style="padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 250px; margin-bottom: 15px;">
            <button onclick="verificarSenhaManual()" style="background: #333; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;">Entrar</button>
        </div>

        <div class="admin-form">
            <h3>Novo Produto</h3>
            <div class="form-grid">
                <input type="text" id="adm-nome" placeholder="Nome do Produto">
                <select id="adm-cat">
                    <option value="" disabled selected>Selecione uma Categoria</option>
                    <option value="Colar">Colar</option>
                    <option value="Brinco">Brinco</option>
                    <option value="Anel">Anel</option>
                    <option value="Pulseira">Pulseira</option>
                    <option value="Tornozeleira">Tornozeleira</option>
                    <option value="Relógio">Relógio</option>
                    <option value="Conjunto">Conjunto</option>
                    <option value="Geral">Outros/Geral</option>
                </select>
                <input type="number" id="adm-preco" placeholder="Preço (Ex: 250.50)">
                <input type="text" id="adm-img" placeholder="URL da Imagem">
                <input type="text" id="adm-desc" class="full-width" placeholder="Breve descrição">
            </div>
            <button class="btn-save" onclick="handleSave()">Salvar no banco de dados <i class="fa-solid fa-database"></i></button>
<button id="btn-cancelar" onclick="resetarFormulario()" style="display:none; background:#888; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">Cancelar</button>
        </div>

        <table class="admin-table">
            <thead>
                <tr>
                    <th>Img</th>
                    <th>Produto</th>
                    <th>Preço</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="admin-list">
                </tbody>
        </table>
    </main>

    <script src="./assets/js/admin.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
</body>
</html>
