<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliva - Seu Carrinho</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/cart.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">OLIVA</a>
        <a href="index.html" style="text-decoration: none; color: var(--text-dark);">Continuar Comprando</a>
    </header>

    <main>
        <h1>Seu Carrinho</h1>
        <div class="cart-container">
            <div class="cart-items" id="cart-items-list"></div>
            <div class="cart-summary">
                <h3>Resumo do Pedido</h3>
                <div class="summary-row" style="margin-top: 20px;">
                    <span>Subtotal</span>
                    <span id="subtotal">R$ 0,00</span>
                </div>
                <div class="summary-row"><span>Frete</span><span style="color: green;">Grátis</span></div>
                <div class="summary-total summary-row">
                    <span>Total</span>
                    <span id="total">R$ 0,00</span>
                </div>
                <button class="checkout-btn" onclick="finalizarPedido()">Finalizar Compra</button>
                <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Voltar ao catálogo</a>
            </div>
        </div>
    </main>

    <script src="./assets/js/cart.js"></script>
</body>
</html>
